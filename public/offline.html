<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Video Mosaic Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(to bottom right, #111827, #1f2937);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            color: #e5e7eb;
        }

        .container {
            text-align: center;
            max-width: 400px;
            padding: 2rem;
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 1.875rem;
            margin-bottom: 0.5rem;
            color: #f3f4f6;
        }

        p {
            color: #9ca3af;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .button {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 0.5rem;
            transition: background 0.3s;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .button:hover {
            background: #2563eb;
        }

        .tips {
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(30, 41, 59, 0.5);
            border-radius: 0.5rem;
            text-align: left;
            font-size: 0.875rem;
        }

        .tips h3 {
            color: #f3f4f6;
            margin-bottom: 0.5rem;
        }

        .tips ul {
            color: #9ca3af;
            margin-left: 1.5rem;
        }

        .tips li {
            margin: 0.5rem 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>You're Offline</h1>
        <p>
            The app is cached and ready to use, but needs a connection to load external resources.
        </p>

        <button class="button" onclick="location.reload()">
            🔄 Retry Connection
        </button>

        <div class="tips">
            <h3>Good News!</h3>
            <ul>
                <li>Your videos are processed locally</li>
                <li>No internet needed during processing</li>
                <li>Try refreshing the page</li>
            </ul>
        </div>
    </div>
</body>
</html>
